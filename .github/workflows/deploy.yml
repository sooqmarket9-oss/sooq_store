name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # اسم الفرع الرئيسي لديك هو main كما في الصورة

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      - name: Create service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project sooqmarket --token "$(firebase login:ci --no-localhost --service-account service-account.json)"
